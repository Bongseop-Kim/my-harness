[manager]
show_hidden = false
sort_by = "natural"
sort_dir_first = true
show_symlink = true

[preview]
image_filter = "lanczos3"
image_quality = 80
max_width = 600
max_height = 900

[opener]
edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
]

[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"
